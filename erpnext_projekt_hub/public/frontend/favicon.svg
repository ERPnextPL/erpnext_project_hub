<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#bg)"/>
  <!-- Outliner lines representing task hierarchy -->
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <!-- Main task line -->
    <line x1="8" y1="10" x2="24" y2="10"/>
    <!-- Subtask lines (indented) -->
    <line x1="11" y1="16" x2="24" y2="16"/>
    <line x1="11" y1="22" x2="24" y2="22"/>
  </g>
  <!-- Checkboxes/bullets -->
  <g fill="white">
    <circle cx="8" cy="10" r="1.5"/>
    <circle cx="11" cy="16" r="1.5"/>
    <circle cx="11" cy="22" r="1.5"/>
  </g>
  <!-- Hierarchy connector -->
  <path d="M8 12 L8 22 L9.5 22" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
