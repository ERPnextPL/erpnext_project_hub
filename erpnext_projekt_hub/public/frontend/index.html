<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Project Outliner | Projekt HUB</title>
		<link rel="icon" type="image/svg+xml" href="/assets/erpnext_projekt_hub/frontend/favicon.svg?v=20241220-2030" />
		<script>
			window.csrf_token = '{{ csrf_token }}';
		</script>
		{{ include_script("frappe-web.bundle.js?v=20241220-2030") }}
		<script type="module" crossorigin src="/assets/erpnext_projekt_hub/frontend/assets/main.js"></script>
		<link rel="modulepreload" crossorigin href="/assets/erpnext_projekt_hub/frontend/assets/chunks/frappe-ui-0cf4ee82.js">
		<link rel="stylesheet" href="/assets/erpnext_projekt_hub/frontend/assets/frappe-ui.css">
		<link rel="stylesheet" href="/assets/erpnext_projekt_hub/frontend/assets/index.css">
	</head>
	<body class="antialiased">
		<div id="app"></div>


		<script id="frappe-boot" type="application/json">
			{{ boot | tojson }}
		</script>
		<script>
			const bootDataEl = document.getElementById("frappe-boot");
			if (bootDataEl?.textContent) {
				try {
					const bootData = JSON.parse(bootDataEl.textContent);
					Object.assign(window, bootData);
				} catch (error) {
					console.warn("Failed to parse boot data", error);
				}
			}
		</script>

          <script>
              {% for key in boot %}
              window["{{ key }}"] = {{ boot[key] | tojson }};
              {% endfor %}
          </script>
          </body>

</html>
